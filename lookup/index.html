<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leaflet lookup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Leaflet lookup</h1>
      <p class="sub">Search products in the PDF leaflets stored in this repo.</p>
      <form class="search-row" id="form">
        <input
          id="q"
          type="search"
          placeholder="e.g. chicken, peppers, cashew…"
          autocomplete="off"
          autofocus
        />
        <div class="tag-filter-wrap" id="tag-filter-wrap" hidden>
          <button
            type="button"
            class="btn-secondary"
            id="tag-filter-toggle"
            aria-expanded="false"
            aria-controls="tag-filter-menu"
          >
            Tags
          </button>
          <div id="tag-filter-menu" class="tag-filter-menu">
            <input
              type="text"
              id="tag-filter-q"
              class="tag-filter-q"
              placeholder="Filter tags…"
              autocomplete="off"
              aria-label="Filter tags"
            />
            <div id="tag-filter-list" role="group" aria-label="Tag filters"></div>
            <p id="tag-filter-empty" class="tag-filter-empty" hidden>No tags match.</p>
            <button type="button" class="tag-filter-clear" id="tag-filter-clear" hidden>
              Clear tags
            </button>
          </div>
        </div>
        <button type="submit">Search</button>
      </form>
      <p id="meta"></p>
      <div id="results"></div>
    </main>
    <script src="products.js"></script>
    <script src="app.js"></script>
  </body>
</html>
